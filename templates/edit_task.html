<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✏️ Редактирование задачи</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <a href="{{ url_for('index') }}" class="back-link">
        <i class="fas fa-arrow-left"></i> Назад 
    </a>

    <div class="form-header">
        <h1>✏️ Редактирование задачи</h1>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" required value="{{ task.title }}">
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description">{{ task.description }}</textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">Приоритет</label>
                <select id="priority" name="priority">
                    <option value="high" {% if task.priority == 'high' %}selected{% endif %}>🔴 Высокий</option>
                    <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>🟡 Средний</option>
                    <option value="low" {% if task.priority == 'low' %}selected{% endif %}>🟢 Низкий</option>
                </select>
            </div>

            <div class="form-group">
                <label for="status">Статус</label>
                <select id="status" name="status">
                    <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>⏳ Ожидает</option>
                    <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>⚙️ В процессе</option>
                    <option value="completed" {% if task.status == 'completed' %}selected{% endif %}>✅ Выполнено</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label for="due_date">Срок выполнения</label>
            <input type="date" id="due_date" name="due_date" value="{{ task.due_date }}">
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Сохранить изменения
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
