<!DOCTYPE html>
<html lang="{{ session.get('lang', 'ru') }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ {{ _('Add task') }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <a href="{{ url_for('index') }}" class="filter-btn" style="margin-bottom: 30px;">
        <i class="fas fa-arrow-left"></i> {{ _('Back') }}
    </a>
<br><br>
    <div class="form-header">
        <h1>{{ _('Add task') }}</h1>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="title">{{ _('Title') }} *</label>
            <input type="text" id="title" name="title" required placeholder="{{ _('Enter task title') }}">
        </div>

        <div class="form-group">
            <label for="description">{{ _('Description') }}</label>
            <textarea id="description" name="description" placeholder="{{ _('Describe the task in detail...') }}"></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">{{ _('Priority') }}</label>
                <select id="priority" name="priority">
                    <option value="high">🔴 {{ _('High') }}</option>
                    <option value="medium" selected>🟡 {{ _('Medium') }}</option>
                    <option value="low">🟢 {{ _('Low') }}</option>
                </select>
            </div>

            <div class="form-group">
                <label for="due_date">{{ _('Due date') }}</label>
                <input type="date" id="due_date" name="due_date">
            </div>

            <div class="form-group">
                <label for="due_time">{{ _('Due time') }}</label>
                <input type="time" id="due_time" name="due_time">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> {{ _('Add task') }}
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">{{ _('Cancel') }}</a>
        </div>
    </form>
</div>
</body>
</html>
