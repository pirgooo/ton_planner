<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>➕ Новая задача</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <a href="{{ url_for('index') }}" class="filter-btn" style="margin-bottom: 30px;">
        <i class="fas fa-arrow-left"></i> Назад
    </a>
<br><br>
    <div class="form-header">
        <h1>Новая задача</h1>
    </div>

    <form method="POST">
        <div class="form-group">
            <label for="title">Название *</label>
            <input type="text" id="title" name="title" required placeholder="Введите название задачи">
        </div>

        <div class="form-group">
            <label for="description">Описание</label>
            <textarea id="description" name="description" placeholder="Опишите задачу подробнее..."></textarea>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="priority">Приоритет</label>
                <select id="priority" name="priority">
                    <option value="high">🔴 Высокий</option>
                    <option value="medium" selected>🟡 Средний</option>
                    <option value="low">🟢 Низкий</option>
                </select>
            </div>

            <div class="form-group">
                <label for="due_date">Срок выполнения</label>
                <input type="date" id="due_date" name="due_date">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-plus"></i> Создать задачу
            </button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
