<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About us</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
</head>
<body>

<div class="container">

        <div class="header">
        <h1>TON Planner</h1>
        <nav class="nav">
                <ul class="menu">
                    <li class="menu__item"><a href="{{ url_for('index') }}" class="menu__link">Tasks</a></li>
                    <li class="menu__item"><a href="{{ url_for('storage') }}" class="menu__link">Storage</a></li>
                    <li class="menu__item"><a href="{{ url_for('manage') }}" class="menu__link">Manage</a></li>
                    <li class="menu__item"><a href="{{ url_for('about') }}" class="menu__link menu__link--active">About</a></li>
                </ul>
            </nav>
        <div class="auth-section">
            {% if current_user %}
                <span class="wallet-badge">
                    <i class="fas fa-wallet"></i> {{ current_user.wallet_address[:8] }}...{{ current_user.wallet_address[-4:] }}
                    {% if current_user.balance is not none %}
                        | {{ "%.2f"|format(current_user.balance) }} TON
                    {% endif %}
                </span>
                <a href="{{ url_for('logout') }}" class="ton-btn disconnect">
                    <i class="fas fa-sign-out-alt"></i>
                </a>
            {% else %}
                <a href="{{ url_for('login') }}" class="menu__link-outline">Login</a>
            {% endif %}
        </div>
    </div>

</div>

<style>
.auth-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

.wallet-badge {
    background: rgba(0, 136, 255, 0.2);
    color: #0088ff;
    padding: 8px 12px;
    border-radius: 8px;
    font-size: 14px;
}

.ton-btn.disconnect {
    background: #333;
    color: white;
    border: none;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
}

.ton-btn.disconnect:hover {
    background: #444;
}

.menu__link-outline {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 40px;
    padding: 0 16px;
    text-decoration: none;
    font-style: normal;
    font-weight: 600;
    font-size: 16px;
    color: #0088ff;
    border: 2px solid #0088ff;
    border-radius: 100px;
    transition: all 0.4s ease;
}

.menu__link-outline:hover {
    background: #f0f0f0;
}
</style>

</body>
</html>
