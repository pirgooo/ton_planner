<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TON Planner</title>
    <link rel="icon" href="{{ url_for('static', filename='icon.png') }}" type="image/png">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Ubuntu+Condensed&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="login-form-container">
        <h1>TON Login</h1>
        <form method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="wallet">Адрес кошелька (TON):</label>
                <input type="text" id="wallet" name="wallet" placeholder="EQ..." required>
            </div>
            <button type="submit" class="btn btn-primary">Войти</button>
        </form>
        <p class="login-hint">Введите адрес вашего TON кошелька для входа</p>
        <a href="{{ url_for('index') }}" class="btn">На главную</a>
    </div>
</div>

<style>
.login-form-container {
    max-width: 400px;
    margin: 100px auto;
    background: #ffffff;
    padding: 40px;
    border-radius: 16px;
    border: 1px solid #e0e0e0;
}

.login-form-container h1 {
    color: #333;
    text-align: center;
    margin-bottom: 30px;
}

.form-group {
    margin-bottom: 20px;
}

.form-group label {
    display: block;
    color: #333;
    margin-bottom: 8px;
}

.form-group input {
    width: 100%;
    padding: 12px;
    border: 1px solid #d1d5db;
    border-radius: 8px;
    background: #fff;
    color: #333;
    font-size: 14px;
}

.form-group input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.15);
}

.btn {
    display: inline-block;
    padding: 12px 24px;
    background: rgb(0, 136, 204);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    width: 100%;
    text-align: center;
    box-sizing: border-box;
    font-weight: 600;
}

.btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 20px rgba(0, 136, 204, 0.26);
}

.login-hint {
    color: #728a96;
    font-size: 12px;
    text-align: center;
    margin: 20px 0;
}
</style>
</body>
</html>
